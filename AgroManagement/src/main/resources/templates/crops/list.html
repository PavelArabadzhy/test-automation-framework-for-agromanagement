<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список культур</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        html, body { height:100%; }
        body { display:flex; flex-direction:column; }
        .main-content { flex:1; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">AgroManagement</a>
    </div>
</nav>

<div class="main-content container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">Культури</h1>
        <div>
            <a th:href="@{/}" class="btn btn-outline-secondary me-2">
                <i class="bi bi-house"></i> Головна
            </a>
            <a th:href="@{/crops/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> Додати культуру
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Назва</th>
                <th>Очікуваний врожай (т/га)</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="crop : ${crops}">
                <td th:text="${crop.id}"></td>
                <td th:text="${crop.name}"></td>
                <td th:text="${#numbers.formatDecimal(crop.expectedYield, 1, 2)}"></td>
                <td>
                    <a th:href="@{'/crops/edit/' + ${crop.id}}"
                       class="btn btn-sm btn-warning me-1">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a th:href="@{'/crops/delete/' + ${crop.id}}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Видалити цю культуру?');">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="bg-white text-center py-3 border-top">
    <small>© 2025 AgroManagement</small>
</footer>

</body>
</html>
