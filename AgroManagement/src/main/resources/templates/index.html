<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>AgroManagement — Головна</title>
  <!-- Bootstrap CSS & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      background-color: #f8f9fa;
    }
    .main-content { flex: 1; }
    .nav-card {
      transition: transform .2s, box-shadow .2s;
    }
    .nav-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    footer {
      background-color: #ffffff;
      text-align: center;
      padding: 1rem 0;
      border-top: 1px solid #dee2e6;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">AgroManagement</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <!-- Для гостей: Login + Register -->
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" th:href="@{/login}">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" th:href="@{/register}">
            <i class="bi bi-person-plus"></i> Register
          </a>
        </li>
        <!-- ссылка на админку только для ADMIN -->
        <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
          <a class="nav-link" th:href="@{/admin}">Admin-панель</a>
        </li>
        <!-- Для залогиненных: Logout -->
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn nav-link btn-link" type="submit">
              <i class="bi bi-box-arrow-right"></i> Logout
            </button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ============================= -->
<!-- 1) Версия для гостей         -->
<!-- ============================= -->
<div class="container main-content py-5" sec:authorize="isAnonymous()">
  <div class="p-5 bg-white rounded shadow-sm text-center">
    <h1 class="mb-4">
      <i class="bi bi-house-door-fill text-success"></i>
      Ласкаво просимо, гість!
    </h1>
    <p class="lead text-muted mb-4">
      Це ваш особистий кабінет AgroManagement.
    </p>
    <a class="btn btn-success me-2" th:href="@{/login}">
      Увійти
    </a>
    <a class="btn btn-outline-primary" th:href="@{/register}">
      Зареєструватися
    </a>
  </div>
</div>

<!-- ======================================= -->
<!-- 2) Версия для авторизованных пользователей -->
<!-- ======================================= -->
<div class="container main-content py-5" sec:authorize="isAuthenticated()">
  <h1 class="text-center mb-5">
    <i class="bi bi-speedometer2 text-success"></i>
    Панель керування
  </h1>
  <div class="row g-4">
    <div class="col-6 col-md-4">
      <a th:href="@{/farms}" class="card nav-card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-building-fill fs-1 text-success"></i>
          <h5 class="mt-3">Ферми</h5>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-4">
      <a th:href="@{/fields}" class="card nav-card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-map-fill fs-1 text-success"></i>
          <h5 class="mt-3">Поля</h5>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-4">
      <a th:href="@{/crops}" class="card nav-card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-flower1 fs-1 text-success"></i>
          <h5 class="mt-3">Культури</h5>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-4">
      <a th:href="@{/plantings}" class="card nav-card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-calendar-event-fill fs-1 text-success"></i>
          <h5 class="mt-3">Посіви</h5>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-4">
      <a th:href="@{/harvests}" class="card nav-card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-basket-fill fs-1 text-success"></i>
          <h5 class="mt-3">Урожай</h5>
        </div>
      </a>
    </div>
  </div>
  <!-- Новая секция: график урожайности -->
  <div class="mt-5 bg-white p-4 rounded shadow-sm">
    <h2 class="h5 mb-3">Статистика урожайности по місяцям</h2>
    <canvas id="yieldChart" style="max-height: 300px;"></canvas>
  </div>
</div>
</div>



<!-- Footer -->
<footer>
  <small>© 2025 AgroManagement</small>
</footer>

<!-- Библиотека для рисования графиков -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Инициализация графика через Thymeleaf -->
<script th:inline="javascript">
  /*<![CDATA[*/
  const labels   = /*[[${yieldLabels}]]*/ [];
  const data     = /*[[${yieldData}]]*/ [];
  const ctx      = document.getElementById('yieldChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Урожайність (т/міс)',
        data: data,
        fill: false,
        borderColor: 'rgba(40,167,69,0.7)',
        tension: 0.3,
        pointRadius: 3
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true,
          title: {
            display: true,
            text: 'Тонн'
          }
        },
        x: {
          title: {
            display: true,
            text: 'Місяць (1–12)'
          }
        }
      },
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y.toFixed(2)} т`
          }
        }
      }
    }
  });
  /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
