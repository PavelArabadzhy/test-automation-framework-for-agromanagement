<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${crop.id} != null ? 'Редагувати культуру' : 'Нова культура'">Культура</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style> body { display:flex; flex-direction:column; min-height:100vh; } .main-content{flex:1;} </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">AgroManagement</a>
    </div>
</nav>

<div class="main-content container py-5">
    <a th:href="@{/crops}" class="btn btn-outline-secondary mb-4">
        <i class="bi bi-list"></i> До списку культур
    </a>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4" th:text="${crop.id} != null ? 'Редагувати культуру' : 'Нова культура'"></h2>
            <form th:action="@{/crops/save}" th:object="${crop}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label">Назва культури</label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Введіть назву" required/>
                </div>
                <!-- Expected yield -->
                <div class="mb-3">
                    <label class="form-label">Очікуваний врожай (т/га)</label>
                    <input type="number" step="0.01" class="form-control"
                           th:field="*{expectedYield}"
                           placeholder="Наприклад, 5.25" required/>
                </div>
                <div class="d-flex mt-4">
                    <button type="submit" class="btn btn-success me-2">
                        <i class="bi bi-save"></i> Зберегти
                    </button>
                    <a th:href="@{/crops}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Відмінити
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="bg-white text-center py-3 border-top">
    <small>© 2025 AgroManagement</small>
</footer>

</body>
</html>
