<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>AgroManagement — Адмінка: Користувачі</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .table-container { background: #fff; padding: 1.5rem; border-radius: .5rem; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">AgroManagement</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Переключити навігацію">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right"></i> Увійти
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/register}">
                        <i class="bi bi-person-plus"></i> Реєстрація
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn nav-link btn-link" type="submit">
                            <i class="bi bi-box-arrow-right"></i> Вийти
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Admin: Users Stats -->
<div class="container py-5" sec:authorize="hasRole('ADMIN')">
    <h1 class="mb-4"><i class="bi bi-people-fill text-success"></i> Користувачі та статистика</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Id</th>
            <th>Логін</th>
            <th>Електронна пошта</th>
            <th>Ферм</th>
            <th>Полів</th>
            <th>Загальний врожай</th>
            <th>Середній врожай</th>
            <th>Дія</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${userStats}">
            <td th:text="${u.userId}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.farmsCount}"></td>
            <td th:text="${u.fieldsCount}"></td>
            <td th:text="${#numbers.formatDecimal(u.totalYield, 1, 'COMMA', 2, 'POINT')} + ' т'"></td>
            <td th:text="${#numbers.formatDecimal(u.avgYield,   1, 'COMMA', 2, 'POINT')} + ' т'"></td>
            <td>
                <a th:href="@{|/admin/users/${u.userId}/edit|}"
                   class="btn btn-sm btn-primary">
                    Редагувати
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Footer -->
<footer class="text-center py-3">
    <small>© 2025 AgroManagement</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
