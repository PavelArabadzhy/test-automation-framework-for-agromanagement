<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
</head>
<body class="p-4">

<h1 class="mb-4">Панель администратора</h1>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Id</th>
        <th>Username</th>
        <th>Email</th>
        <th>Ферм</th>
        <th>Полей</th>
        <th>Всего урожая</th>
        <th>Средний урожай</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${usersStats}">
        <td th:text="${u.userId}"></td>
        <td th:text="${u.username}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.farmsCount}"></td>
        <td th:text="${u.fieldsCount}"></td>
        <td th:text="${#numbers.formatDecimal(u.totalYield, 1, 'COMMA', 2, 'POINT')} + ' т'"></td>
        <td th:text="${#numbers.formatDecimal(u.avgYield,   1, 'COMMA', 2, 'POINT')} + ' т'"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
