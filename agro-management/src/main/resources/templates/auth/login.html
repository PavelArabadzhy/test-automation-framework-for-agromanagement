<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | AgroManagement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-sm" style="min-width: 320px;">
    <h2 class="text-center mb-4">Login</h2>
    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text"
               id="username"
               name="username"
               class="form-control"
               required autofocus/>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password"
               id="password"
               name="password"
               class="form-control"
               required/>
      </div>
      <button type="submit" class="btn btn-success w-100">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </button>
    </form>
    <!-- Show error when login fails -->
    <div th:if="${param.error}" class="mt-3 alert alert-danger text-center">
      Невірний логін або пароль
    </div>
    <div th:if="${param.logout}" class="mt-3 alert alert-success text-center">
      Ви вийшли із системи
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
