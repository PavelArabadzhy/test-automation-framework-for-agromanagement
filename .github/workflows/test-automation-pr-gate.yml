name: Test Automation PR Gate

on:
  pull_request:
    paths:
      - "test-automation-framework/**"
      - ".github/workflows/test-automation-pr-gate.yml"
  push:
    branches: ["main"]
    paths:
      - "test-automation-framework/**"
      - ".github/workflows/test-automation-pr-gate.yml"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-automation-framework
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: test-automation-framework/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  smoke-and-security:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: test-automation-framework
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      USER_USERNAME: ${{ secrets.USER_USERNAME }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: test-automation-framework/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: npm run test:smoke

      - name: Run security suite
        run: npm run test:security

      - name: Cleanup test data
        if: always()
        run: npm run cleanup:data

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-security-artifacts
          path: |
            test-automation-framework/test-results
            test-automation-framework/playwright-report
          if-no-files-found: ignore

  full-regression:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: test-automation-framework
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      USER_USERNAME: ${{ secrets.USER_USERNAME }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: test-automation-framework/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run full regression
        run: npm test

      - name: Cleanup test data
        if: always()
        run: npm run cleanup:data

      - name: Upload full regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-regression-artifacts
          path: |
            test-automation-framework/test-results
            test-automation-framework/playwright-report
          if-no-files-found: ignore
